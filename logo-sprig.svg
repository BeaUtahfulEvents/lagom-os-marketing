<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">

  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#1E293B"/>

  <defs>
    <!-- Leaf shape: tip at top (0,–42), base narrows to point at (0,14) -->
    <!-- Widest at about y=–4, roughly ±19px -->
    <g id="birch-leaf">
      <path d="
        M 0,-42
        C 15,-28 20,-10 19,2
        C 17,11 9,15 0,16
        C -9,15 -17,11 -19,2
        C -20,-10 -15,-28 0,-42
        Z
      " fill="#86AEAD"/>
      <!-- Central vein -->
      <line x1="0" y1="-38" x2="0" y2="14" stroke="rgba(255,255,255,0.28)" stroke-width="1.2" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- Main stem -->
  <line x1="100" y1="115" x2="100" y2="160" stroke="#86AEAD" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left leaf — angled upper-left, slightly smaller -->
  <use href="#birch-leaf" transform="translate(100,115) rotate(-36) scale(0.88)"/>

  <!-- Center leaf — pointing straight up, largest -->
  <use href="#birch-leaf" transform="translate(100,115)"/>

  <!-- Right leaf — angled upper-right, slightly smaller -->
  <use href="#birch-leaf" transform="translate(100,115) rotate(36) scale(0.88)"/>

</svg>
