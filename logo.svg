<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#1E293B"/>

  <!-- Three balance bars — outer two shorter, center longer and sage -->
  <!-- Top bar -->
  <rect x="52" y="72" width="96" height="10" rx="5" fill="#FFFFFF" opacity="0.9"/>

  <!-- Center bar — sage, slightly wider, the "just right" midpoint -->
  <rect x="40" y="95" width="120" height="10" rx="5" fill="#86AEAD"/>

  <!-- Bottom bar -->
  <rect x="52" y="118" width="96" height="10" rx="5" fill="#FFFFFF" opacity="0.9"/>

  <!-- Center pivot dot — the exact middle point -->
  <circle cx="100" cy="100" r="5" fill="#FFFFFF"/>
</svg>
